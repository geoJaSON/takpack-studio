services:
  takpack-studio:
    build: .
    image: takpack-studio
    container_name: takpack-studio
    restart: unless-stopped
    environment:
      PORT: 8745
      TAKPACK_DATA_DIR: /data
    volumes:
      - takpack-data:/data
    # Pick ONE of the two networking styles below.
    #
    # A) Caddy reverse-proxies over a shared Docker network (recommended):
    #    no published port; Caddy reaches it as http://takpack-studio:8745.
    #    Uncomment and set this to the network Caddy already runs on.
    # networks:
    #   - caddy
    #
    # B) Caddy proxies to a host port: publish it and proxy to 127.0.0.1:8745.
    ports:
      - "127.0.0.1:8745:8745"

volumes:
  takpack-data:

# networks:
#   caddy:
#     external: true
