services:
  takpack-studio:
    build: .
    image: takpack-studio
    container_name: takpack-studio
    restart: unless-stopped
    environment:
      PORT: 8745
      TAKPACK_DATA_DIR: /data
    volumes:
      - takpack-data:/data
    networks:
      - edge

volumes:
  takpack-data:

networks:
  edge:
    external: true
    name: edge
